# ============================================================================
# PCI-DSS Compliance Tracker — Application Configuration
# All sensitive values should be injected via environment variables
# ============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pci-dss-compliance-tracker

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pci_dss_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  # BUG-1 FIX: baseline-on-migrate lets Flyway treat an existing schema as
  # baseline version 1 instead of failing with "table already exists".
  # clean-disabled=true prevents accidental data loss; never set it false in prod.
  # out-of-order=true lets team members merge migration branches freely.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    out-of-order: true
    validate-on-migrate: true

  # Redis
  # BUG-2 FIX: Add connection/command timeouts and Lettuce pool so that a
  # temporarily unavailable Redis on startup does not crash the application.
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 5000
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # Mail (for notifications)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}
  refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800}

# AI Service
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:5000}

# Scheduler Configuration
scheduler:
  admin-email: ${SCHEDULER_ADMIN_EMAIL:admin@pcidss-demo.com}
  cron:
    overdue-reminder: ${SCHEDULER_CRON_OVERDUE:0 0 8 * * ?}
    deadline-alert: ${SCHEDULER_CRON_DEADLINE:0 0 9 * * ?}
    weekly-summary: ${SCHEDULER_CRON_WEEKLY:0 0 7 ? * MON}
